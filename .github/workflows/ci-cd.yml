name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build .NET test project
        run: dotnet build tests/Calculator.Reqnroll.Tests/Calculator.Reqnroll.Tests.csproj

      - name: Install Playwright browser for .NET tests
        run: pwsh tests/Calculator.Reqnroll.Tests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          npm test 2>&1 | tee artifacts/logs/unit-tests.log

      - name: Run e2e tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/vite.log 2>&1 &
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:4173 >/dev/null; then
              break
            fi
            sleep 2
          done
          dotnet test tests/Calculator.Reqnroll.Tests/Calculator.Reqnroll.Tests.csproj --logger "trx;LogFileName=e2e.trx" 2>&1 | tee artifacts/logs/e2e-tests.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts
            test-results
          if-no-files-found: warn
          overwrite: true

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          overwrite: true

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
